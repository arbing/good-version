name: 发布新版本

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '发布的版本 tag（如 v0.2.0）'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: 构建 ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            runner: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm64
            bundle_path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg
            ext: dmg

          - name: macOS (Intel)
            runner: macos-13
            target: x86_64-apple-darwin
            artifact: macos-x64
            bundle_path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg
            ext: dmg

          - name: Windows (x64)
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows-x64
            bundle_path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis
            ext: exe

          - name: Windows (ARM64)
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: windows-arm64
            bundle_path: src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis
            ext: exe

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: 安装前端依赖
        run: pnpm install

      - name: 构建
        run: pnpm exec tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.bundle_path }}/*.${{ matrix.ext }}
          retention-days: 3

  release:
    name: 发布 GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: false

      - name: 确定版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: dist/**/*
